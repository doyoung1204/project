{% extends "base.html" %}
{% block content %}
<h2>구매 완료</h2>
{% if product_name %}
<p>"{{ product_name }}" 상품을 {{ "{:,}".format(total) }}원에 구매하셨습니다.</p>
{% else %}
<p>총 {{ "{:,}".format(total) }}원 결제가 완료되었습니다.</p>
{% endif %}
<a href="{{ url_for('main') }}" class="btn btn-primary mt-3">메인으로 돌아가기</a>
{% endblock %}
