<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Flask Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <!-- ✅ 상단 내비게이션 바 -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light px-4">
        <a class="navbar-brand" href="{{ url_for('main') }}">🛍️ 도깅이의 개쩌는 옷가게</a>

        <div class="ms-auto d-flex align-items-center gap-2">
            {% if session.get('user_id') %}
                <!-- ✅ 목록 보기 버튼 추가 -->
                <a class="btn btn-outline-secondary" href="{{ url_for('main') }}">목록 보기</a>
                <a class="btn btn-outline-success" href="{{ url_for('cart') }}">장바구니</a>
                <a class="btn btn-outline-danger" href="{{ url_for('logout') }}">로그아웃</a>
            {% else %}
                <a class="btn btn-outline-primary me-2" href="{{ url_for('login') }}">로그인</a>
                <a class="btn btn-primary" href="{{ url_for('signup') }}">회원가입</a>
            {% endif %}
        </div>
    </nav>

    <!-- 본문 영역 -->
    <div class="container mt-5">
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="alert alert-info">
                    {{ messages[0] }}
                </div>
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </div>
</body>
</html>
